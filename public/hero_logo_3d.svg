<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Gradients for 3D effect -->
    <linearGradient id="lobsterBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E83E3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C92A2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lobsterHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="cleanGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C49204;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
    
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="5" dy="5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background (Optional, currently transparent) -->

  <!-- Group: Lobster -->
  <g transform="translate(100, 100) scale(1.2)" filter="url(#dropShadow)">
    <!-- Legs -->
    <path d="M40 120 Q 20 140 10 160" stroke="#C92A2A" stroke-width="8" fill="none" stroke-linecap="round" />
    <path d="M160 120 Q 180 140 190 160" stroke="#C92A2A" stroke-width="8" fill="none" stroke-linecap="round" />
    
    <!-- Body -->
    <path d="M60 100 C 60 40 140 40 140 100 C 140 160 60 160 60 100 Z" fill="url(#lobsterBody)" />
    <!-- Segment lines -->
    <path d="M65 80 H 135" stroke="#A61E1E" stroke-width="2" opacity="0.5" />
    <path d="M65 100 H 135" stroke="#A61E1E" stroke-width="2" opacity="0.5" />
    <path d="M65 120 H 135" stroke="#A61E1E" stroke-width="2" opacity="0.5" />

    <!-- Claws -->
    <path d="M40 60 C 10 30 10 90 40 80 Z" fill="url(#lobsterBody)" transform="rotate(-20 40 70)" />
    <path d="M160 60 C 190 30 190 90 160 80 Z" fill="url(#lobsterBody)" transform="rotate(20 160 70)" />

    <!-- Eyes -->
    <circle cx="85" cy="50" r="8" fill="white" />
    <circle cx="85" cy="50" r="3" fill="black" />
    <circle cx="115" cy="50" r="8" fill="white" />
    <circle cx="115" cy="50" r="3" fill="black" />
    
    <!-- Antennae -->
    <path d="M90 40 Q 80 10 50 10" stroke="#C92A2A" stroke-width="2" fill="none" />
    <path d="M110 40 Q 120 10 150 10" stroke="#C92A2A" stroke-width="2" fill="none" />

    <!-- Holding Bitcoin (Right Claw) -->
    <g transform="translate(160, 50) rotate(10)">
      <circle cx="0" cy="0" r="30" fill="url(#cleanGold)" stroke="#B8860B" stroke-width="2" />
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#B8860B">₿</text>
      <!-- Shine -->
      <path d="M-20 -10 L -10 -20 L 5 -5 L -5 5 Z" fill="white" opacity="0.4" />
    </g>
  </g>

  <!-- Group: 3D Text "CRYPTOBOOK" -->
  <g transform="translate(350, 180)" filter="url(#dropShadow)">
    <!-- 3D Extrusion Layer (Darker) -->
    <text x="5" y="5" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#555">CRYPTOBOOK</text>
    <text x="4" y="4" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#555">CRYPTOBOOK</text>
    <text x="3" y="3" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#555">CRYPTOBOOK</text>
    <text x="2" y="2" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#555">CRYPTOBOOK</text>
    <text x="1" y="1" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#555">CRYPTOBOOK</text>
    
    <!-- Front Layer -->
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="url(#textGradient)" stroke="white" stroke-width="2">CRYPTOBOOK</text>
  </g>
</svg>
